name: ClipCascade CI/CD

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ──────────────── Test ────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev pkg-config
      - name: Tidy modules
        run: |
          cd pkg && go mod tidy
          cd ../server && go mod tidy
          cd ../desktop && go mod tidy
      - name: Run tests
        run: go test -v -race ./pkg/... ./server/... ./desktop/...
      - name: Vet
        run: go vet ./pkg/... ./server/... ./desktop/...

  # ──────────────── Build Server ────────────────
  build-server:
    name: Build Server (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o ../clipcascade-server-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: clipcascade-server-*

  # ──────────────── Build Desktop (终端版，不带 UI) ────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
          - os: macos-amd64
            runner: macos-14
            goos: darwin
            goarch: amd64
          - os: windows-amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            cgo: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev libxxf86vm-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev pkg-config
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo || '1' }}
          CGO_CFLAGS: ${{ matrix.goos == 'darwin' && matrix.goarch == 'amd64' && '-arch x86_64' || '' }}
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && matrix.goarch == 'amd64' && '-arch x86_64' || '' }}
        run: |
          cd desktop
          EXT=""
          EXTRA_LDFLAGS="-s -w"
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
            EXTRA_LDFLAGS="-s -w -H=windowsgui"
          fi
          go build -ldflags="$EXTRA_LDFLAGS" -o ../clipcascade-desktop-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: clipcascade-desktop-*

  # ──────────────── Release ────────────────
  release:
    name: Create Release
    needs: [build-server, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
