<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipCascade - Admin / 管理面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        th,
        td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
        }

        th {
            color: #6c63ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e0e0;
            cursor: pointer;
            font-size: 12px;
            transition: background .2s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            border-color: rgba(255, 107, 107, .3);
            color: #ff6b6b;
        }

        .btn-danger:hover {
            background: rgba(255, 107, 107, .15);
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat .value {
            font-size: 20px;
            font-weight: 700;
            color: #6c63ff;
        }

        .stat .label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .back {
            display: block;
            text-align: center;
            color: #6c63ff;
            text-decoration: none;
            font-size: 13px;
            margin-top: 16px;
        }

        dialog {
            background: rgba(30, 30, 60, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #e0e0e0;
            padding: 24px;
            max-width: 350px;
        }

        dialog input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #fff;
            margin: 8px 0 16px;
            font-size: 14px;
        }

        dialog .btn {
            width: 100%;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚙️ Admin Panel / 管理面板</h1>
        <div class="toolbar">
            <button class="btn" onclick="openCreateUser()">+ Add User / 添加用户</button>
        </div>
        <div class="stats" id="stats"></div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username / 用户名</th>
                    <th>Role / 角色</th>
                    <th>Created / 创建时间</th>
                    <th>Actions / 操作</th>
                </tr>
            </thead>
            <tbody id="users"></tbody>
        </table>
        <a href="/" class="back">← Back to Dashboard / 返回控制台</a>
    </div>

    <dialog id="resetDialog">
        <h3 style="margin-bottom:8px">Reset Password / 重置密码</h3>
        <input type="password" id="newPassword" placeholder="New password (min 4 chars) / 新密码 (最少4位)">
        <button class="btn" onclick="doReset()">Update / 更新</button>
        <button class="btn" onclick="document.getElementById('resetDialog').close()"
            style="margin-top:8px;background:transparent">Cancel / 取消</button>
    </dialog>
    <dialog id="createDialog">
        <h3 style="margin-bottom:8px">Create User / 创建用户</h3>
        <input type="text" id="createUsername" placeholder="Username / 用户名">
        <input type="password" id="createPassword" placeholder="Password (min 4 chars) / 密码 (最少4位)">
        <button class="btn" onclick="doCreateUser()">Create / 创建</button>
        <button class="btn" onclick="document.getElementById('createDialog').close()"
            style="margin-top:8px;background:transparent">Cancel / 取消</button>
    </dialog>

    <script>
        let resetUserId = null;

        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const d = await res.json();
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="value">${d.users}</div><div class="label">Users / 用户数</div></div>
                <div class="stat"><div class="value">${d.ws?.active_connections || 0}</div><div class="label">WS Connections / WS 连接数</div></div>
                <div class="stat"><div class="value">${d.p2p?.active_peers || 0}</div><div class="label">P2P Peers / P2P 节点</div></div>`;
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            document.getElementById('users').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td><td>${u.username}</td><td>${u.role}</td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td class="actions">
                        <button class="btn" onclick="resetPw(${u.id})">Reset PW / 重置密码</button>
                        <button class="btn" onclick="toggleRole(${u.id},'${u.role}')">${u.role === 'ADMIN' ? '→USER' : '→ADMIN'}</button>
                        <button class="btn btn-danger" onclick="deleteUser(${u.id},'${u.username}')">Delete / 删除</button>
                    </td>
                </tr>`).join('');
        }

        function resetPw(id) { resetUserId = id; document.getElementById('resetDialog').showModal(); }

        async function doReset() {
            const pw = document.getElementById('newPassword').value;
            if (pw.length < 4) return alert('Min 4 chars');
            await fetch(`/api/admin/users/${resetUserId}/password`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
            document.getElementById('resetDialog').close();
            document.getElementById('newPassword').value = '';
        }

        async function toggleRole(id, current) {
            const role = current === 'ADMIN' ? 'USER' : 'ADMIN';
            await fetch(`/api/admin/users/${id}/role`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role }) });
            loadUsers();
        }

        async function deleteUser(id, name) {
            if (!confirm(`Delete user "${name}"? / 确定要删除用户 "${name}" 吗？`)) return;
            await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            loadUsers();
        }

        function openCreateUser() {
            document.getElementById('createDialog').showModal();
        }

        async function doCreateUser() {
            const username = document.getElementById('createUsername').value.trim();
            const password = document.getElementById('createPassword').value;
            if (!username || password.length < 4) {
                return alert('Username required, password min 4 chars');
            }
            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.json().catch(() => ({}));
            if (!res.ok) {
                return alert(result.error || 'Create user failed');
            }
            document.getElementById('createDialog').close();
            document.getElementById('createUsername').value = '';
            document.getElementById('createPassword').value = '';
            loadUsers();
            loadStats();
        }

        loadStats(); loadUsers();
        setInterval(loadStats, 5000);
    </script>
</body>

</html>
