<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipCascade - Sign Up / 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border .2s;
        }

        input:focus {
            border-color: #6c63ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(108, 99, 255, .4);
        }

        .error {
            background: rgba(255, 107, 107, .15);
            border: 1px solid rgba(255, 107, 107, .3);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }

        .link a {
            color: #6c63ff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📝 Sign Up / 注册</h1>

        {{if eq .error "user_exists"}}
        <div class="error">Username already taken. / 用户名已被使用。</div>
        {{else if eq .error "max_accounts_reached"}}
        <div class="error">Maximum accounts reached. / 已达到最大账户数限制。</div>
        {{else if .error}}
        <div class="error">Registration failed. Please check your input. / 注册失败，请检查输入。</div>
        {{end}}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label for="username">Username / 用户名</label>
                <input type="text" id="username" name="username" required maxlength="50"
                    placeholder="Choose a username / 请选择用户名">
            </div>
            <div class="form-group">
                <label for="password">Password (min 4 chars) / 密码（最少4位）</label>
                <input type="password" id="password" name="password" required minlength="4" placeholder="••••••••">
            </div>
            <button type="submit">Create Account / 创建账户</button>
        </form>
        <div class="link"><a href="/login">← Back to Login / 返回登录</a></div>
    </div>
</body>

</html>
